name: terraform

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply after a successful AI review"
        required: true
        type: boolean
        default: false

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_WORKING_DIR: environments/homelab
  TF_CI_VAR_FILE: ci.tfvars
  LM_STUDIO_BASE_URL: http://localhost:1234/v1
  LM_STUDIO_MODEL: google/gemma-4-e2b
  TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}

defaults:
  run:
    shell: powershell

jobs:
  plan:
    name: plan
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight secrets
        env:
          PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PROXMOX_API_TOKEN)) {
            throw "Missing required secret: PROXMOX_API_TOKEN"
          }

          $token = $env:PROXMOX_API_TOKEN
          if ($token -match '(?i)replace-me|changeme|example') {
            throw "PROXMOX_API_TOKEN appears to be a placeholder."
          }

          if ($token -notmatch '^[^=\s!@]+@[^=\s!]+![^=\s]+=[^=\s]+$') {
            throw "PROXMOX_API_TOKEN has invalid format. Expected user@realm!tokenid=secret."
          }

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.0

      - name: Terraform fmt
        run: terraform.exe -chdir=${{ env.TF_WORKING_DIR }} fmt -check -recursive

      - name: Terraform init
        run: |
          # Remove any stale state from a previous runner execution so each run imports cleanly.
          Remove-Item -Path "${{ env.TF_WORKING_DIR }}/terraform.tfstate" -ErrorAction SilentlyContinue
          Remove-Item -Path "${{ env.TF_WORKING_DIR }}/terraform.tfstate.backup" -ErrorAction SilentlyContinue
          terraform.exe -chdir=${{ env.TF_WORKING_DIR }} init -input=false

      - name: Terraform validate
        run: terraform.exe -chdir=${{ env.TF_WORKING_DIR }} validate

      - name: Verify Proxmox connectivity
        continue-on-error: true
        run: |
          # Extract the endpoint from ci.tfvars and test auth before attempting import.
          $endpoint = (Select-String -Path "${{ env.TF_WORKING_DIR }}/${{ env.TF_CI_VAR_FILE }}" -Pattern 'proxmox_endpoint\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          $token = $env:TF_VAR_proxmox_api_token
          # PS5.1 (Windows PowerShell) does not have -SkipCertificateCheck; bypass via ServicePointManager.
          # Also force TLS 1.2 since PS5.1 defaults to TLS 1.0 which Proxmox rejects.
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          [Net.ServicePointManager]::ServerCertificateValidationCallback = { $true }
          try {
            $resp = Invoke-RestMethod -Uri "${endpoint}api2/json/nodes" `
              -Headers @{ Authorization = "PVEAPIToken=$token" } `
              -ErrorAction Stop
          } finally {
            [Net.ServicePointManager]::ServerCertificateValidationCallback = $null
          }
          if (-not $resp.data) { throw "Proxmox API returned empty response - check PROXMOX_API_TOKEN secret." }
          $nodes = ($resp.data | ForEach-Object { $_.node }) -join ', '
          Write-Host "Proxmox connectivity OK. Nodes: $nodes"

      - name: Import existing resources
        env:
          TF_LOG: INFO
        run: |
          # PowerShell mangles Terraform for_each addresses on Windows; route through cmd.exe.
          cmd /c 'terraform.exe -chdir=${{ env.TF_WORKING_DIR }} import -input=false -var-file=${{ env.TF_CI_VAR_FILE }} "module.proxmox_vms[\"edge_vm\"].proxmox_virtual_environment_vm.this" h1/1101'
          if ($LASTEXITCODE -ne 0) { throw "edge_vm import failed with code $LASTEXITCODE" }
          cmd /c 'terraform.exe -chdir=${{ env.TF_WORKING_DIR }} import -input=false -var-file=${{ env.TF_CI_VAR_FILE }} "module.proxmox_lxcs[\"ci_runner\"].proxmox_virtual_environment_container.this" h1/1102'
          if ($LASTEXITCODE -ne 0) { throw "ci_runner import failed with code $LASTEXITCODE" }

      - name: Terraform plan
        run: cmd /c 'terraform.exe -chdir=${{ env.TF_WORKING_DIR }} plan -var-file=${{ env.TF_CI_VAR_FILE }} -out tfplan.binary -input=false'

      - name: Terraform show json
        run: |
          $planJson = terraform.exe -chdir=${{ env.TF_WORKING_DIR }} show -json tfplan.binary
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText("${{ env.TF_WORKING_DIR }}/tfplan.json", $planJson, $utf8NoBom)

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: AI plan review
        id: ai_review
        run: |
          python scripts/ai_plan_review.py `
            --plan-json ${{ env.TF_WORKING_DIR }}/tfplan.json `
            --endpoint ${{ env.LM_STUDIO_BASE_URL }} `
            --model ${{ env.LM_STUDIO_MODEL }}

      - name: Upload plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan.binary
            ${{ env.TF_WORKING_DIR }}/tfplan.json

  apply:
    name: apply
    runs-on: self-hosted
    needs: plan
    if: github.event_name == 'workflow_dispatch' && inputs.apply
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight secrets
        env:
          PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PROXMOX_API_TOKEN)) {
            throw "Missing required secret: PROXMOX_API_TOKEN"
          }

          $token = $env:PROXMOX_API_TOKEN
          if ($token -match '(?i)replace-me|changeme|example') {
            throw "PROXMOX_API_TOKEN appears to be a placeholder."
          }

          if ($token -notmatch '^[^=\s!@]+@[^=\s!]+![^=\s]+=[^=\s]+$') {
            throw "PROXMOX_API_TOKEN has invalid format. Expected user@realm!tokenid=secret."
          }

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.0

      - name: Terraform init
        run: terraform.exe -chdir=${{ env.TF_WORKING_DIR }} init -input=false

      - name: Import existing resources
        run: |
          # PowerShell mangles Terraform for_each addresses on Windows; route through cmd.exe.
          cmd /c 'terraform.exe -chdir=${{ env.TF_WORKING_DIR }} import -input=false -var-file=${{ env.TF_CI_VAR_FILE }} "module.proxmox_vms[\"edge_vm\"].proxmox_virtual_environment_vm.this" h1/1101'
          if ($LASTEXITCODE -ne 0) { throw "edge_vm import failed with code $LASTEXITCODE" }
          cmd /c 'terraform.exe -chdir=${{ env.TF_WORKING_DIR }} import -input=false -var-file=${{ env.TF_CI_VAR_FILE }} "module.proxmox_lxcs[\"ci_runner\"].proxmox_virtual_environment_container.this" h1/1102'
          if ($LASTEXITCODE -ne 0) { throw "ci_runner import failed with code $LASTEXITCODE" }

      - name: Terraform plan (apply job)
        run: cmd /c 'terraform.exe -chdir=${{ env.TF_WORKING_DIR }} plan -var-file=${{ env.TF_CI_VAR_FILE }} -out tfplan_apply.binary -input=false'

      - name: Terraform apply
        run: terraform.exe -chdir=${{ env.TF_WORKING_DIR }} apply -input=false -auto-approve tfplan_apply.binary

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Post-Apply Health Check
        run: python scripts/terraform_output_health_check.py ${{ env.TF_WORKING_DIR }}


